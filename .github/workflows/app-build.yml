name: Build, Push

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag from commit SHA
        id: tag
        run: echo "IMAGE_TAG=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v3.3.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./app
          file: ./docker/Dockerfile
          push: true
          tags: |
            rasikh11/cloud-native-app:${{ steps.tag.outputs.IMAGE_TAG }}
            rasikh11/cloud-native-app:latest

      - name: Update image tag in deployment.yml
        run: |
          sed -i "s|image: rasikh11/cloud-native-app:.*|image: rasikh11/cloud-native-app:${{ steps.tag.outputs.IMAGE_TAG }}|g" \
            kubernetes/base/deployment.yml

      - name: Commit and push updated deployment.yml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kubernetes/base/deployment.yml
          git diff --staged --quiet || git commit -m "ci: update image tag to ${{ steps.tag.outputs.IMAGE_TAG }} [skip ci]"
          git push
