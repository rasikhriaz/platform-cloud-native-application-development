apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-demo
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/rasikhriaz/platform-cloud-native-application-development
    targetRevision: main
    path: kubernetes/base
  destination:
    server: https://kubernetes.default.svc
    namespace: platform-demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
